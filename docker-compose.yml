services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: anoda
      POSTGRES_PASSWORD: password
      POSTGRES_DB: anoda_facematch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anoda -d anoda_facematch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  ai_service:
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/src/uploads:/app/apps/api/src/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      target: api
    command: sh -c "cd apps/api && bun run migrate && cd /app && bun run start:api"
    ports:
      - "3005:3005"
    environment:
      - DATABASE_URL=postgresql://anoda:password@db:5432/anoda_facematch?schema=public
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai_service:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api/src/uploads:/app/apps/api/src/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      target: worker
    environment:
      - DATABASE_URL=postgresql://anoda:password@db:5432/anoda_facematch?schema=public
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai_service:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./apps/api/src/uploads:/app/apps/api/src/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  client:
    build:
      context: .
      target: client
    ports:
      - "4173:4173"
    environment:
      - VITE_API_URL=http://localhost:3005
      - API_TARGET=http://api:3005
    depends_on:
      - api

  # LGTM OBSERVABILITY STACK
  loki:
    image: grafana/loki:2.9.2
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki

  promtail:
    image: grafana/promtail:2.9.2
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.2
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki
      - prometheus

volumes:
  postgres_data:
  loki_data:
  prometheus_data:
  grafana_data:
