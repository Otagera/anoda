services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anoda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-anoda_facematch}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anoda} -d ${POSTGRES_DB:-anoda_facematch}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  ai_service:
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/apps/api/src/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      target: api
    command: sh -c "cd apps/api && bun run migrate && bunx prisma db seed && cd /app && bun run start:api"
    ports:
      - "3005:3005"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://anoda:password@db:5432/anoda_facematch?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai_service:8000}
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_REGION=${R2_REGION:-auto}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/apps/api/src/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      target: worker
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://anoda:password@db:5432/anoda_facematch?schema=public}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai_service:8000}
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_REGION=${R2_REGION:-auto}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - uploads:/app/apps/api/src/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  uploads:
