services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: anoda
      POSTGRES_PASSWORD: password
      POSTGRES_DB: anoda_facematch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anoda -d anoda_facematch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  ai_service:
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/src/uploads:/app/apps/api/src/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      target: api
    command: sh -c "cd apps/api && bun run migrate && cd /app && bun run start:api"
    ports:
      - "3005:3005"
    environment:
      - DATABASE_URL=postgresql://anoda:password@db:5432/anoda_facematch?schema=public
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai_service:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api/src/uploads:/app/apps/api/src/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      target: worker
    environment:
      - DATABASE_URL=postgresql://anoda:password@db:5432/anoda_facematch?schema=public
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai_service:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_started
    volumes:
      - ./apps/api/src/uploads:/app/apps/api/src/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
